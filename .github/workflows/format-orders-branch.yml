name: Temporary orders branch formatter

on:
  push:
    branches: [feat/admin-platform-orders-list]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-platform-orders-list
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Format Dart sources
        run: dart format .

      - name: Commit formatting
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- '*.dart'
          git commit -m 'style(orders): apply dart formatting'
          git push origin HEAD:feat/admin-platform-orders-list
