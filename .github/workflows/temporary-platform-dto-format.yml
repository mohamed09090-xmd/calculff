name: Temporary platform DTO format patch

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Generate Dart format patch
        shell: bash
        run: |
          set -euo pipefail
          dart format \
            lib/features/admin_platform/infrastructure \
            test/features/admin_platform/infrastructure \
            test/features/admin_platform/domain/admin_platform_domain_architecture_test.dart
          git diff --binary -- \
            lib/features/admin_platform/infrastructure \
            test/features/admin_platform/infrastructure \
            test/features/admin_platform/domain/admin_platform_domain_architecture_test.dart \
            > dart-format.patch
          test -s dart-format.patch

      - name: Upload Dart format patch
        uses: actions/upload-artifact@v4
        with:
          name: platform-dto-dart-format-patch
          path: dart-format.patch
          if-no-files-found: error
          retention-days: 1
