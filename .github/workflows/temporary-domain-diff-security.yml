name: Temporary domain diff and security check

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-domain-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check diff and secret material
        shell: bash
        run: |
          set -euo pipefail
          base='5b064bde711bf3b0d6715267c110b3ab06304d59'

          git diff --check "$base"...HEAD

          while IFS= read -r path; do
            case "$path" in
              *.env|*.jks|*.keystore|android/key.properties|google-services.json|GoogleService-Info.plist)
                echo "Forbidden sensitive file in diff: $path" >&2
                exit 1
                ;;
            esac
          done < <(git diff --name-only "$base"...HEAD)

          git diff --unified=0 "$base"...HEAD > domain-change.diff

          if grep -Eqi \
            'sb_secret_|service_role|github_pat_|ghp_[A-Za-z0-9]{20,}|-----BEGIN ([A-Z]+ )?PRIVATE KEY-----|https://[a-z0-9]{20}\.supabase\.co|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' \
            domain-change.diff; then
            echo 'Potential secret material found in diff.' >&2
            exit 1
          fi

          echo 'git diff --check: passed'
          echo 'secret material scan: passed'
