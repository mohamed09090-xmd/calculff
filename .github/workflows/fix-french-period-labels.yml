name: Fix French report period labels

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-french-period-labels.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Add exact French period translations
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('lib/core/localization/french_catalog.dart')
          source = path.read_text(encoding='utf-8')
          marker = "  'تقرير مدير رصيد الألعاب':"
          addition = """  '7 أيام': '7 derniers jours',
          '30 يومًا': '30 derniers jours',
          """
          if "'7 أيام': '7 derniers jours'," not in source:
              source = source.replace(marker, addition + marker, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Format Dart sources
        run: dart format lib test

      - name: Commit period translations
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          git commit -m "Fix French report period labels"
          git push origin HEAD:main
