name: Temporary guarded offers main merge

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  merge-main:
    if: github.event.pull_request.number == 10 && github.head_ref == 'feat/admin-platform-offers-management'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-platform-offers-management
          fetch-depth: 0

      - name: Verify guarded starting state
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "867b7454fb8ac18d7b77371c31b2bf6a2eb7a9c1"
          test -z "$(git status --porcelain)"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "6c0381325f4a0007000cfd17215beb3bf9b9a626"

      - name: Merge main with merge commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git merge --no-ff origin/main -m "Merge main into feat/admin-platform-offers-management"
          test -z "$(git status --porcelain)"
          git push origin HEAD:feat/admin-platform-offers-management
