name: Temporary format games branch

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/admin-platform-games-management'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Format and commit Dart sources
        shell: bash
        run: |
          set -euo pipefail
          dart format .
          if git diff --quiet -- '*.dart'; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            lib/features/admin_platform/application/games \
            lib/features/admin_platform/infrastructure/games \
            lib/features/admin_platform/presentation/games \
            lib/features/admin_platform/presentation/customer_platform_shell.dart \
            lib/features/admin_platform/presentation/platform_ui_text.dart \
            test/features/admin_platform/application/games_controller_test.dart \
            test/features/admin_platform/infrastructure/supabase_games_data_source_test.dart \
            test/features/admin_platform/infrastructure/supabase_games_repository_test.dart \
            test/features/admin_platform/presentation/games_screen_widget_test.dart \
            test/features/admin_platform/games_feature_architecture_test.dart
          git commit -m 'style: format games implementation'
          git push origin "HEAD:${{ github.head_ref }}"
