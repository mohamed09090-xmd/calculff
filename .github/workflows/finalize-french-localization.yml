name: Finalize French localization sources

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-french-localization.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Localize all exported report formats
        shell: python
        run: |
          from pathlib import Path

          report_path = Path('lib/features/reports/data/report_export_service.dart')
          source = report_path.read_text(encoding='utf-8')
          source = source.replace(
              'textDirection: ui.TextDirection.rtl,',
              'textDirection: Directionality.of(context),',
              1,
          )
          source = source.replace(
              "textContent = '\\uFEFF${buildCsv(report)}';",
              """final languageCode = context == null
              ? 'ar'
              : Localizations.localeOf(context).languageCode;
          textContent =
              '\\uFEFF${buildCsv(report, languageCode: languageCode)}';""",
              1,
          )

          start = source.index('  static String buildCsv(')
          end = source.index('\n  static String _csv', start)
          csv_method = r'''  static String buildCsv(
    ReportSummary report, {
    String languageCode = 'ar',
  }) {
    String tr(String value) =>
        AppTranslator.translateForLanguage(value, languageCode);

    final buffer = StringBuffer()
      ..writeln(tr('تقرير مدير رصيد الألعاب'))
      ..writeln('${tr('الفترة')},${_csv(tr(report.period.label))}')
      ..writeln('${tr('تم الإنشاء')},${report.generatedAt.toIso8601String()}')
      ..writeln()
      ..writeln('${tr('المؤشر')},${tr('القيمة')}')
      ..writeln('${tr('المبيعات')},${report.current.sales}')
      ..writeln('${tr('التكلفة')},${report.current.cost}')
      ..writeln('${tr('الربح')},${report.current.profit}')
      ..writeln('${tr('عدد العمليات')},${report.current.transactionCount}')
      ..writeln('${tr('عدد العملاء')},${report.current.customerCount}')
      ..writeln('${tr('متوسط العملية')},${report.current.averageSale}')
      ..writeln('${tr('الرصيد المطلوب')},${report.current.requiredCredit}')
      ..writeln('${tr('الرصيد المشتَرى')},${report.current.purchasedCredit}')
      ..writeln()
      ..writeln(tr('الاتجاه الزمني'))
      ..writeln('${tr('الفترة')},${tr('المبيعات')},${tr('الربح')}');

    for (final point in report.points) {
      buffer.writeln('${_csv(point.label)},${point.sales},${point.profit}');
    }

    buffer
      ..writeln()
      ..writeln(tr('أفضل المنتجات'))
      ..writeln(
        '${tr('المنتج')},${tr('العمليات')},${tr('المبيعات')},${tr('الربح')}',
      );
    for (final item in report.topProducts) {
      buffer.writeln(
        '${_csv(item.label)},${item.transactionCount},${item.sales},${item.profit}',
      );
    }

    buffer
      ..writeln()
      ..writeln(tr('أفضل العملاء'))
      ..writeln(
        '${tr('العميل')},${tr('العمليات')},${tr('المبيعات')},${tr('الربح')}',
      );
    for (final item in report.topCustomers) {
      buffer.writeln(
        '${_csv(item.label)},${item.transactionCount},${item.sales},${item.profit}',
      );
    }

    return buffer.toString();
  }
'''
          source = source[:start] + csv_method + source[end:]
          report_path.write_text(source, encoding='utf-8')

          catalog_path = Path('lib/core/localization/french_catalog.dart')
          catalog = catalog_path.read_text(encoding='utf-8')
          if "'الفترة': 'Période'," not in catalog:
              catalog = catalog.replace(
                  'const Map<String, String> additionalFrenchTranslations = {',
                  """const Map<String, String> additionalFrenchTranslations = {
  'تقرير مدير رصيد الألعاب':
      'Rapport du gestionnaire de crédit de jeux',
  'الفترة': 'Période',
  'تم الإنشاء': 'Créé le',
  'المؤشر': 'Indicateur',
  'القيمة': 'Valeur',
  'الاتجاه الزمني': 'Évolution temporelle',
  'العميل': 'Client',""",
                  1,
              )
          catalog_path.write_text(catalog, encoding='utf-8')

          test_path = Path('test/report_export_service_test.dart')
          tests = test_path.read_text(encoding='utf-8')
          marker = "يبني CSV بالفرنسية عند اختيار الفرنسية"
          if marker not in tests:
              insertion = r'''

  test('يبني CSV بالفرنسية عند اختيار الفرنسية', () {
    final csv = ReportExportService.buildCsv(report, languageCode: 'fr');

    expect(csv, contains('Rapport du gestionnaire de crédit de jeux'));
    expect(csv, contains('Période,"7 derniers jours"'));
    expect(csv, contains('Ventes,3500'));
    expect(csv, contains('Coût,2400'));
    expect(csv, contains('Bénéfice,1100'));
    expect(csv, contains('Meilleurs produits'));
    expect(csv, contains('Meilleurs clients'));
  });
'''
              close = tests.rfind('\n}')
              tests = tests[:close] + insertion + tests[close:]
          test_path.write_text(tests, encoding='utf-8')

      - name: Format localized Dart sources
        run: dart format lib test

      - name: Commit finalized sources
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib test
          git commit -m "Localize report exports in French"
          git push origin HEAD:main
