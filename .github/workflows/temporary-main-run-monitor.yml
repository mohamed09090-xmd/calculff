name: Temporary main run monitor

on:
  push:
    branches: [feat/admin-platform-offers-management]

permissions:
  actions: read
  contents: write

jobs:
  monitor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-platform-offers-management

      - name: Wait for merged main workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MERGE_SHA: 86962a0a3c757278a0e1f13744cd852fef92a01b
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          run_id=""
          for attempt in $(seq 1 80); do
            runs_json="$(curl --fail --silent --show-error \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "${api}/actions/runs?head_sha=${MERGE_SHA}&event=push&per_page=20")"
            run_id="$(jq -r '.workflow_runs[] | select(.name == "Verify and build signed Android release") | .id' <<<"${runs_json}" | head -n1)"
            if [ -n "${run_id}" ] && [ "${run_id}" != "null" ]; then
              break
            fi
            sleep 15
          done
          test -n "${run_id}"
          test "${run_id}" != "null"

          for attempt in $(seq 1 120); do
            run_json="$(curl --fail --silent --show-error \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "${api}/actions/runs/${run_id}")"
            status="$(jq -r '.status' <<<"${run_json}")"
            if [ "${status}" = "completed" ]; then
              break
            fi
            sleep 15
          done

          jobs_json="$(curl --fail --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "${api}/actions/runs/${run_id}/jobs?per_page=100")"
          artifacts_json="$(curl --fail --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "${api}/actions/runs/${run_id}/artifacts?per_page=100")"

          jq -n \
            --arg merge_sha "${MERGE_SHA}" \
            --argjson run "${run_json}" \
            --argjson jobs "${jobs_json}" \
            --argjson artifacts "${artifacts_json}" \
            '{merge_sha: $merge_sha, run: $run, jobs: $jobs, artifacts: $artifacts}' \
            > main-run-status.json

          test "$(jq -r '.run.status' main-run-status.json)" = "completed"

      - name: Commit monitor result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add main-run-status.json
          git commit -m "ci: record merged main workflow result"
          git push origin HEAD:feat/admin-platform-offers-management
