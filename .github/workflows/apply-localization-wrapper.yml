name: Apply localized text wrapper

on:
  push:
    branches: [main]
    paths:
      - tool/apply_localized_text_imports.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply locale-aware Text imports
        run: python3 tool/apply_localized_text_imports.py

      - name: Commit generated source updates
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib
          git commit -m "Apply locale-aware Text wrapper across UI"
          git push origin HEAD:main
