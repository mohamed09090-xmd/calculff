name: Format platform UI diagnostics

on:
  pull_request:
    paths:
      - 'lib/app/router.dart'
      - 'lib/core/constants/app_strings.dart'
      - 'lib/core/localization/french_catalog.dart'
      - 'lib/core/widgets/app_shell.dart'
      - 'lib/features/admin_platform/presentation/**'
      - 'test/features/admin_platform/**'
      - '.github/workflows/format-platform-ui.yml'

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Format platform UI files
        id: format
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          dart format \
            lib/app/router.dart \
            lib/core/constants/app_strings.dart \
            lib/core/localization/french_catalog.dart \
            lib/core/widgets/app_shell.dart \
            lib/features/admin_platform/presentation \
            test/features/admin_platform
          git diff --binary -- \
            lib/app/router.dart \
            lib/core/constants/app_strings.dart \
            lib/core/localization/french_catalog.dart \
            lib/core/widgets/app_shell.dart \
            lib/features/admin_platform/presentation \
            test/features/admin_platform \
            > platform-ui-format.patch
          git diff --exit-code -- \
            lib/app/router.dart \
            lib/core/constants/app_strings.dart \
            lib/core/localization/french_catalog.dart \
            lib/core/widgets/app_shell.dart \
            lib/features/admin_platform/presentation \
            test/features/admin_platform

      - name: Upload formatter patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-ui-format-patch
          path: platform-ui-format.patch
          if-no-files-found: error
          retention-days: 1

      - name: Stop on formatting changes
        if: steps.format.outcome == 'failure'
        run: exit 1
