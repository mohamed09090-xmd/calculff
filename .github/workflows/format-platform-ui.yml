name: Apply platform UI formatting

on:
  push:
    branches:
      - feat/admin-platform-foundation

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-platform-foundation
          fetch-depth: 1

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Apply Dart formatting and remove this temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          dart format \
            lib/app/router.dart \
            lib/core/constants/app_strings.dart \
            lib/core/localization/french_catalog.dart \
            lib/core/widgets/app_shell.dart \
            lib/features/admin_platform/presentation \
            test/features/admin_platform
          rm .github/workflows/format-platform-ui.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            lib/app/router.dart \
            lib/core/constants/app_strings.dart \
            lib/core/localization/french_catalog.dart \
            lib/core/widgets/app_shell.dart \
            lib/features/admin_platform/presentation \
            test/features/admin_platform \
            .github/workflows/format-platform-ui.yml
          git commit -m "style(platform): format customer platform UI"
          git push origin HEAD:feat/admin-platform-foundation
