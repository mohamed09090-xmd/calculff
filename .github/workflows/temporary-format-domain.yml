name: Temporary format domain artifact

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Format domain files
        run: dart format lib/features/admin_platform/domain test/features/admin_platform/domain

      - name: Upload formatted domain files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-admin-platform-domain
          path: |
            lib/features/admin_platform/domain
            test/features/admin_platform/domain
          if-no-files-found: error
          retention-days: 1
