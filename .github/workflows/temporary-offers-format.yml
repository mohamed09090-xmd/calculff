name: Temporary offers formatter

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'feat/admin-platform-offers-management'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-platform-offers-management

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Format Dart files
        run: dart format .

      - name: Commit formatter output
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- '*.dart'
          git commit -m "style(offers): apply Dart formatting"
          git push origin HEAD:feat/admin-platform-offers-management
