name: Temporary platform session security verification

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-session-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify session diff and security boundaries
        shell: bash
        run: |
          set -euo pipefail
          base='57c6bb2bfa0303f1b6519630fbb8c9bc5f5044b2'
          temporary_workflow='.github/workflows/temporary-platform-session-security.yml'
          architecture_guard='test/features/admin_platform/application/platform_session_architecture_test.dart'

          git diff --check "$base"...HEAD

          git diff --name-only "$base"...HEAD \
            | grep -v -F "$temporary_workflow" \
            > changed-files.txt

          cat > allowed-files.txt <<'EOF'
          lib/features/admin_platform/application/common/platform_common_providers.dart
          lib/features/admin_platform/application/common/platform_data_scope.dart
          lib/features/admin_platform/application/common/platform_session_coordinator.dart
          lib/features/admin_platform/infrastructure/common/supabase_platform_error_mapper.dart
          test/features/admin_platform/application/platform_common_providers_test.dart
          test/features/admin_platform/application/platform_session_architecture_test.dart
          test/features/admin_platform/application/platform_session_coordinator_test.dart
          test/features/admin_platform/infrastructure/supabase_platform_error_mapper_test.dart
          EOF
          sort -o allowed-files.txt allowed-files.txt
          sort -o changed-files.txt changed-files.txt
          diff -u allowed-files.txt changed-files.txt

          while IFS= read -r path; do
            case "$path" in
              *.env|*.jks|*.keystore|android/key.properties|google-services.json|GoogleService-Info.plist)
                echo "Sensitive file changed: $path" >&2
                exit 1
                ;;
            esac
          done < changed-files.txt

          cat > production-files.txt <<'EOF'
          lib/features/admin_platform/application/common/platform_common_providers.dart
          lib/features/admin_platform/application/common/platform_data_scope.dart
          lib/features/admin_platform/application/common/platform_session_coordinator.dart
          lib/features/admin_platform/infrastructure/common/supabase_platform_error_mapper.dart
          EOF

          git diff --unified=0 "$base"...HEAD -- \
            . \
            ":(exclude)$temporary_workflow" \
            ":(exclude)$architecture_guard" \
            > session-change.diff

          if grep -Eqi \
            'sb_secret_[A-Za-z0-9_-]+|service_role[^A-Za-z0-9_]+[A-Za-z0-9._-]+|github_pat_[A-Za-z0-9_]{20,}|ghp_[A-Za-z0-9]{20,}|-----BEGIN ([A-Z]+ )?PRIVATE KEY-----|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}' \
            session-change.diff; then
            echo 'Potential secret material found in 3B diff.' >&2
            exit 1
          fi

          if xargs -r grep -Eni \
            'txxokpovdbvsvnkpbrrp|zegjqwsvsaprnguvxuwk|supabase\.co|service_role|sb_secret_|SupabaseClient|PostgrestFilterBuilder|package:sqflite|AppRepository|DatabaseHelper|Supabase\.instance\.client' \
            < production-files.txt; then
            echo 'Forbidden project, client, secret, or persistence reference found.' >&2
            exit 1
          fi

          if xargs -r grep -Eni \
            '\.(select|insert|update|delete|rpc)\s*\(|\.from\s*\(|\.storage\.|\.functions\.|\.realtime\.' \
            < production-files.txt; then
            echo 'Query, mutation, storage, function, or realtime operation found.' >&2
            exit 1
          fi

          if xargs -r grep -Eni \
            'print\s*\(|debugPrint\s*\(|logger\.|payload\.toString\s*\(|jsonEncode\s*\(payload|rawResponse|rawException|stackTrace' \
            < production-files.txt; then
            echo 'Raw payload, response, exception, or logging reference found.' >&2
            exit 1
          fi

          if xargs -r grep -Eni 'userMetadata|user_metadata' < production-files.txt; then
            echo 'user_metadata authorization reference found.' >&2
            exit 1
          fi

          listener_count="$(grep -Rho '\.auth\.onAuthStateChange' lib/features/admin_platform --include='*.dart' | wc -l | tr -d ' ')"
          test "$listener_count" = '1'

          echo 'git diff --check: passed'
          echo 'scope verification: passed'
          echo 'secret and sensitive-file scan: passed'
          echo 'cloud/query/logging verification: passed'
          echo 'auth listener count: 1'
